<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #000; --active-scale: 1.05; }
        
        body, html { 
            background: var(--bg); margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* FILMSTRIP WRAPPER */
        #viewport {
            height: 100vh; width: 100vw;
            display: flex;
            overflow-x: auto; /* Horizontal for mobile peeking */
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            align-items: center;
        }

        header, section {
            flex: 0 0 85vw; /* 85% width lets the next/prev photos "peek" in */
            height: 100vh;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            scroll-snap-align: center;
            position: relative;
            transition: opacity 0.8s ease;
        }

        /* Initial Header styling */
        header { flex: 0 0 100vw; }
        h1 { font-size: 0.7rem; font-weight: 300; letter-spacing: 0.8em; text-transform: uppercase; opacity: 0.5; }

        /* IMAGE CONTAINER & FOCUS LOGIC */
        .photo-container {
            width: 90%; height: 70vh;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.2, 1), filter 1.2s ease;
            filter: brightness(0.2) blur(4px); /* Non-showing photos are dimmed/blurred */
            transform: scale(0.85);
            will-change: transform, filter;
        }

        /* Active Photo Pop */
        section.is-active .photo-container {
            filter: brightness(1) blur(0px);
            transform: scale(1);
        }

        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 30px 100px rgba(0,0,0,1);
            pointer-events: none;
        }

        /* UI ELEMENTS */
        .ui-layer {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; z-index: 100; pointer-events: none;
        }

        #slideshow-btn {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 24px; border-radius: 40px;
            font-size: 0.6rem; letter-spacing: 0.2em; pointer-events: auto; cursor: pointer;
        }

        #slideshow-btn.active { background: #fff; color: #000; font-weight: bold; }

        /* DESKTOP ADJUSTMENTS */
        @media (min-width: 1024px) {
            #viewport {
                flex-direction: column; /* Desktop feels more natural scrolling down */
                overflow-y: auto; overflow-x: hidden;
                scroll-snap-type: y mandatory;
            }
            header, section { flex: 0 0 100vh; width: 100vw; }
            .photo-container { width: 70%; height: 85vh; }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <header>
            <h1>Ultra HDR Portfolio</h1>
            <div style="color:#222; font-size:0.5rem; letter-spacing:0.3em; margin-top:20px;">CLARENCE • 2025</div>
        </header>
        <div id="gallery-root" style="display: contents;"></div>
    </div>

    <div class="ui-layer">
        <div style="opacity:0.3; font-size:0.5rem; letter-spacing:0.2em;">SWIPE OR SCROLL</div>
        <button id="slideshow-btn">AUTO</button>
    </div>

    <script>
        const root = document.getElementById('gallery-root');
        const view = document.getElementById('viewport');
        const total = 39;
        let isAuto = false;
        let timer;

        // Populate Photos
        for (let i = 1; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(s);
        }

        const items = document.querySelectorAll('header, section');

        // Focus Tracking & Lazy Loading
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-active');
                    const id = entry.target.dataset.id;
                    const container = entry.target.querySelector('.photo-container');
                    if (id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif">`;
                    }
                } else {
                    entry.target.classList.remove('is-active');
                }
            });
        }, { threshold: 0.6 });

        items.forEach(item => observer.observe(item));

        // Navigation Controls
        function navigate(dir) {
            const currentIdx = [...items].indexOf(document.querySelector('.is-active'));
            const nextIdx = Math.max(0, Math.min(items.length - 1, currentIdx + dir));
            items[nextIdx].scrollIntoView({ behavior: 'smooth' });
        }

        // Desktop Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === "ArrowDown") navigate(1);
            if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigate(-1);
        });

        // Slideshow Logic (4s)
        const btn = document.getElementById('slideshow-btn');
        btn.addEventListener('click', () => {
            isAuto = !isAuto;
            btn.classList.toggle('active');
            btn.innerText = isAuto ? "STOP" : "AUTO";
            if (isAuto) {
                timer = setInterval(() => {
                    const currentIdx = [...items].indexOf(document.querySelector('.is-active'));
                    if (currentIdx === items.length - 1) items[0].scrollIntoView();
                    else navigate(1);
                }, 4000);
            } else {
                clearInterval(timer);
            }
        });

        // Kill slideshow on manual user interaction
        view.addEventListener('touchstart', () => { if(isAuto) btn.click(); });
        view.addEventListener('wheel', () => { if(isAuto) btn.click(); });

    </script>
</body>
</html>
