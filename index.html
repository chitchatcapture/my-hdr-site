<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass-bg: rgba(12, 12, 12, 0.65); 
            --liquid-border: rgba(255, 255, 255, 0.12);
            --ui-text: rgba(255, 255, 255, 0.95);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 1. CINEMATIC FILMSTRIP (80vh = 10% Peek) */
        #main-wrapper {
            height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory;
            scroll-behavior: auto; /* Managed by JS for liquid smoothness */
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        #main-wrapper::-webkit-scrollbar { display: none; }

        header, section {
            height: 80vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; scroll-snap-align: center;
            scroll-snap-stop: always; position: relative;
        }
        header { height: 100vh; }

        .header-content { text-align: center; transition: opacity 0.8s ease; will-change: opacity; }
        h1 { font-size: 0.8rem; font-weight: 300; letter-spacing: 1em; text-transform: uppercase; margin: 0; }
        .credit { color: rgba(255,255,255,0.4); font-size: 0.5rem; letter-spacing: 0.5em; text-transform: uppercase; margin-top: 15px; }

        .photo-container { 
            width: 90%; height: 70vh; display: flex; justify-content: center; align-items: center;
            /* Premium Slow Transition */
            transition: transform 1.2s cubic-bezier(0.33, 1, 0.68, 1), 
                        filter 1.2s cubic-bezier(0.33, 1, 0.68, 1);
            filter: brightness(0.6) blur(2px); transform: scale(0.92);
            will-change: transform, filter;
        }
        .active .photo-container { filter: brightness(1) blur(0px); transform: scale(1); }
        img { max-width: 100%; max-height: 100%; border-radius: 2px; box-shadow: 0 40px 140px rgba(0,0,0,1); }

        /* 2. iOS 26 LIQUID GLASS FILMSTRIP */
        #ui-trigger-zone { position: fixed; bottom: 0; left: 0; width: 100%; height: 130px; z-index: 10001; }
        
        #thumb-slider {
            position: fixed; bottom: 35px; left: 50%; transform: translate3d(-50%, 50px, 0);
            width: 90%; max-width: 520px; height: 65px; z-index: 10002;
            display: flex; align-items: center; gap: 10px; overflow-x: auto;
            padding: 0 50%; /* Center Snapping */
            background: var(--glass-bg);
            backdrop-filter: blur(45px) saturate(1.8) contrast(1.1);
            -webkit-backdrop-filter: blur(45px) saturate(1.8) contrast(1.1);
            border-radius: 22px; 
            border: 1px solid var(--liquid-border);
            opacity: 0; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            scroll-snap-type: x mandatory; scrollbar-width: none;
            pointer-events: none;
        }
        #thumb-slider::-webkit-scrollbar { display: none; }
        
        #ui-trigger-zone:hover ~ #thumb-slider, #thumb-slider:hover { 
            opacity: 1; transform: translate3d(-50%, 0, 0); pointer-events: auto;
        }

        .thumb {
            flex: 0 0 34px; height: 23px; background-size: cover; background-position: center;
            border-radius: 4px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.35; filter: brightness(0.6); scroll-snap-align: center;
        }
        /* Rectangle-to-Square Liquid Transition */
        .thumb.active-thumb { 
            flex: 0 0 44px; height: 44px; opacity: 1; 
            filter: brightness(1); border-radius: 6px; 
        }

        /* AUTO BUTTON */
        #slideshow-btn {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--liquid-border);
            color: #fff; padding: 10px 24px; border-radius: 40px; font-size: 0.6rem;
            letter-spacing: 0.3em; cursor: pointer; transition: 0.4s;
        }
        #slideshow-btn.active { background: #fff; color: #000; border-color: transparent; font-weight: 600; }

        @media (max-width: 768px) {
            header, section { height: 80vh; } header { height: 100vh; }
            .photo-container { height: 60vh; }
            #thumb-slider { height: 55px; bottom: 25px; padding: 0 45%; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active" data-id="1">
            <div class="header-content" id="title-block">
                <h1>Ultra HDR Portfolio</h1>
                <div class="credit">Photographed by Clarence • 2023–2025</div>
            </div>
            <div class="photo-container"><img src="img-1.avif"></div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div id="ui-trigger-zone"></div>
    <div id="thumb-slider"></div>
    <button id="slideshow-btn">AUTO</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const slider = document.getElementById('thumb-slider');
        const titleBlock = document.getElementById('title-block');
        const total = 39;
        let isAuto = false, autoTimer;

        // 1. Optimized DOM Injection
        const frag = document.createDocumentFragment();
        for (let i = 2; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            frag.appendChild(s);
        }
        root.appendChild(frag);

        for (let i = 1; i <= total; i++) {
            const t = document.createElement('div');
            t.className = 'thumb';
            t.style.backgroundImage = `url(img-${i}.avif)`;
            t.onclick = () => {
                items[i-1].scrollIntoView({ behavior: 'smooth' });
            };
            slider.appendChild(t);
        }

        const items = document.querySelectorAll('header, section');
        const thumbs = document.querySelectorAll('.thumb');

        // 2. High-Frequency Tracking (60fps)
        const updateScene = () => {
            const sliderCenter = slider.scrollLeft + (slider.offsetWidth / 2);
            let closestIdx = 0;
            let minDistance = Infinity;

            // Sync Slider -> Main Photo (Instant Scrub)
            if (slider.matches(':hover') || slider === document.activeElement) {
                thumbs.forEach((t, i) => {
                    const tCenter = t.offsetLeft + (t.offsetWidth / 2);
                    const dist = Math.abs(sliderCenter - tCenter);
                    if (dist < minDistance) { minDistance = dist; closestIdx = i; }
                });
                items[closestIdx].scrollIntoView({ behavior: 'auto' });
            }

            // Sync Main Scroll -> Slider & Focus
            const mainCenter = wrapper.scrollTop + (window.innerHeight / 2);
            items.forEach((item, i) => {
                const itemCenter = item.offsetTop + (item.offsetHeight / 2);
                const dist = Math.abs(mainCenter - itemCenter);
                
                if (dist < 400) { // Proximity trigger
                    item.classList.add('active');
                    thumbs[i].classList.add('active-thumb');
                    if (!slider.matches(':hover')) {
                        thumbs[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                    titleBlock.style.opacity = i === 0 ? "1" : "0";
                    
                    // Lazy Load
                    const c = item.querySelector('.photo-container');
                    if (item.dataset.id && c && !c.innerHTML) {
                        c.innerHTML = `<img src="img-${item.dataset.id}.avif">`;
                    }
                } else {
                    item.classList.remove('active');
                    thumbs[i].classList.remove('active-thumb');
                }
            });

            requestAnimationFrame(updateScene);
        };
        requestAnimationFrame(updateScene);

        // 3. Premium Auto-Scroll
        const btn = document.getElementById('slideshow-btn');
        btn.onclick = () => {
            isAuto = !isAuto;
            btn.classList.toggle('active');
            btn.innerText = isAuto ? "STOP" : "AUTO";
            if (isAuto) {
                autoTimer = setInterval(() => {
                    const current = [...items].indexOf(document.querySelector('.active'));
                    const next = (current + 1) % items.length;
                    // Custom slow transition
                    items[next].scrollIntoView({ behavior: 'smooth' });
                }, 4500); // 1.5s scroll + 3s viewing
            } else clearInterval(autoTimer);
        };

        // Keyboard Logic
        window.onkeydown = (e) => {
            const curr = [...items].indexOf(document.querySelector('.active'));
            if (e.key === "ArrowDown" || e.key === "ArrowRight") items[Math.min(curr + 1, total-1)].scrollIntoView();
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") items[Math.max(curr - 1, 0)].scrollIntoView();
        };

        wrapper.onwheel = () => { if(isAuto) btn.click(); };
        wrapper.ontouchstart = () => { if(isAuto) btn.click(); };
    </script>
</body>
</html>
