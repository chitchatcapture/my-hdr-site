<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra HDR Gallery</title>
    <style>
        :root { --bg: #0a0a0a; --text: #eee; --btn: #444; }
        [data-theme="light"] { --bg: #f4f4f4; --text: #222; --btn: #ccc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; transition: 0.3s; padding: 40px 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        #theme-toggle { background: var(--btn); color: var(--text); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 30px; }
        picture img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <button id="theme-toggle">Switch Mode</button>
        <h1>Ultra HDR Photography</h1>

        <picture>
            <!-- High-Brightness HDR File -->
            <source srcset="IMG_0235.avif" type="image/avif">
            <!-- Standard Fallback File -->
            <img src="IMG_0127.JPG" alt="HDR Landscape">
        </picture>
        
        <p style="margin-top: 20px; opacity: 0.6;">Use Chrome/Edge on an HDR screen for full brightness.</p>
    </div>

    <script>
        const btn = document.getElementById("theme-toggle");
        btn.addEventListener("click", () => {
            document.body.getAttribute("data-theme") === "light" 
            ? document.body.removeAttribute("data-theme") 
            : document.body.setAttribute("data-theme", "light");
        });
    </script>
</body>
</html>
