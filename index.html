<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDR Portfolio</title>
    <style>
        :root { --bg: #050505; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }

        /* 1. DISBALE TEXT/IMAGE SELECTION */
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; /* Disables the long-press menu on iPhone */
        }

        #gallery { max-width: 1100px; margin: 0 auto; padding: 100px 20px; display: flex; flex-direction: column; gap: 120px; }
        
        .photo-wrapper { opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .photo-wrapper.visible { opacity: 1; transform: translateY(0); }

        img { 
            max-width: 100%; max-height: 85vh; width: auto; height: auto;
            border-radius: 2px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            
            /* 2. DISABLE DRAGGING */
            -webkit-user-drag: none;
            pointer-events: none; /* Makes the image "invisible" to clicks, preventing saves */
        }
    </style>
</head>

<!-- 3. DISABLE RIGHT-CLICK MENU GLOBALLY -->
<body oncontextmenu="return false;">

    <header style="padding: 100px 20px 40px;">
        <h1 style="font-size: 0.9rem; font-weight: 300; letter-spacing: 0.4em; text-transform: uppercase;">Ultra HDR Portfolio</h1>
    </header>

    <div id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');
        const totalImages = 39; 
        for (let i = 1; i <= totalImages; i++) {
            const div = document.createElement('div');
            div.className = 'photo-wrapper';
            div.innerHTML = `<img src="img-${i}.avif" loading="lazy">`;
            gallery.appendChild(div);
        }
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.photo-wrapper').forEach(w => observer.observe(w));
    </script>
</body>
</html>
