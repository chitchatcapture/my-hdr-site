<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #000; --glass: rgba(15, 15, 15, 0.85); }
        
        /* 1. GPU Acceleration: Tells the computer to use its graphics card for smooth motion */
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. Film Grain Overlay (Optimized to not lag the CPU) */
        .grain {
            position: fixed; top: -150%; left: -150%; width: 300%; height: 300%;
            background-image: url('https://upload.wikimedia.org');
            opacity: 0.03; pointer-events: none; z-index: 9999;
            animation: grain 8s steps(10) infinite;
            will-change: transform; /* Helps GPU performance */
        }

        @keyframes grain {
            0%, 100% { transform:translate(0, 0); }
            10% { transform:translate(-2%, -1%); }
            50% { transform:translate(-5%, 5%); }
        }

        /* Protection */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }

        #main-wrapper {
            transition: transform 1.6s cubic-bezier(0.25, 1, 0.3, 1);
            will-change: transform; /* Prevents "jitter" during long scrolls */
        }

        header, section {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            position: relative; overflow: hidden;
        }
        
        h1 { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.7em; text-transform: uppercase; margin: 0; opacity: 0.6; }
        .credit { color: #333; font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 30px; }

        .photo-container { width: 85%; height: 80vh; display: flex; justify-content: center; align-items: center; }

        img {
            max-width: 100%; max-height: 100%; border-radius: 1px;
            box-shadow: 0 80px 160px rgba(0,0,0,1);
            -webkit-user-drag: none; pointer-events: none;
            /* Animation optimized for stability */
            animation: cinematicFloat 22s ease-in-out infinite;
            will-change: transform, scale;
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: scale(1.02) translateY(0); }
            50% { transform: scale(1.06) translateY(-15px); }
        }

        #slideshow-btn {
            position: fixed; bottom: 45px; right: 45px; z-index: 10000;
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 14px 30px; border-radius: 60px;
            font-size: 0.6rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #slideshow-btn:active { transform: scale(0.92); }
        #slideshow-btn.active { background: #fff; color: #000; }

        @media (max-width: 768px) {
            .photo-container { width: 92%; height: 75vh; }
            #slideshow-btn { bottom: 35px; right: 25px; padding: 12px 24px; font-size: 0.5rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="grain"></div>

    <div id="main-wrapper">
        <header>
            <h1>Ultra HDR Portfolio</h1>
            <div class="credit">Photographed by Clarence • 2023–2025</div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const totalImages = 39;
        let currentIdx = 0;
        let autoPlayActive = false;
        let slideTimer;

        // 3. Crash Prevention: Generate sections but keep images "Empty" until needed
        for (let i = 1; i <= totalImages; i++) {
            const sec = document.createElement('section');
            sec.setAttribute('data-id', i);
            sec.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(sec);
        }

        const sections = document.querySelectorAll('section');

        function goToSlide(index) {
            if (index < 0) index = 0;
            if (index > totalImages) index = totalImages;
            currentIdx = index;
            wrapper.style.transform = `translateY(-${index * 100}vh)`;
        }

        // 4. Memory Management: Load images only when they are close to appearing
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.getAttribute('data-id');
                const container = entry.target.querySelector('.photo-container');
                
                if (entry.isIntersecting) {
                    if (!container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif" loading="lazy">`;
                    }
                } else {
                    // Optional: Clear memory of distant images (Useful for older phones)
                    // container.innerHTML = ""; 
                }
            });
        }, { rootMargin: "100% 0px", threshold: 0.01 });

        sections.forEach(sec => observer.observe(sec));

        // Keyboard & Controls
        window.addEventListener('keydown', (e) => {
            if (autoPlayActive) toggleSlideshow();
            if (e.key === "ArrowDown" || e.key === "ArrowRight") goToSlide(currentIdx + 1);
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") goToSlide(currentIdx - 1);
        });

        const btn = document.getElementById('slideshow-btn');
        function toggleSlideshow() {
            autoPlayActive = !autoPlayActive;
            btn.classList.toggle('active');
            btn.innerText = autoPlayActive ? "Stop Slideshow" : "Start Slideshow";
            if (autoPlayActive) {
                slideTimer = setInterval(() => {
                    goToSlide((currentIdx + 1) % (totalImages + 1));
                }, 5800);
            } else {
                clearInterval(slideTimer);
            }
        }
        btn.addEventListener('click', toggleSlideshow);

        // Prevent Scroll Crash
        let lastScroll = 0;
        window.addEventListener('wheel', (e) => {
            const now = Date.now();
            if (now - lastScroll < 1700) return;
            lastScroll = now;
            if (autoPlayActive) toggleSlideshow();
            if (e.deltaY > 0) goToSlide(currentIdx + 1);
            else goToSlide(currentIdx - 1);
        }, { passive: true });
    </script>
</body>
</html>
