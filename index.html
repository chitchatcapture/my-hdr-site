<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(10, 10, 10, 0.8); 
            --accent: rgba(255, 255, 255, 0.95);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. OPTIMIZED WHITE HDR GRAIN (GPU ACCELERATED) */
        .grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.12; pointer-events: none; z-index: 9999;
            mix-blend-mode: screen;
            animation: grain-shift 0.2s steps(2) infinite;
            will-change: transform;
        }
        @keyframes grain-shift {
            0% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(-2%, -2%, 0); }
            100% { transform: translate3d(1%, 1%, 0); }
        }

        /* Layout & Scroll */
        #main-wrapper {
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            will-change: transform;
        }

        header, section {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        
        h1 { font-size: 0.8rem; font-weight: 300; letter-spacing: 0.8em; text-transform: uppercase; opacity: 0.5; }
        .credit { color: #555; font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 40px; }

        .photo-container { width: 88%; height: 82vh; display: flex; justify-content: center; align-items: center; }

        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: breathe 20s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1.02); }
            50% { transform: scale(1.05) translateY(-8px); }
        }

        /* High-Visibility Navigation */
        .nav-ui {
            position: fixed; bottom: 40px; z-index: 10000;
            display: flex; align-items: center; gap: 20px;
        }
        
        #slideshow-btn {
            right: 40px; background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 12px 28px; border-radius: 40px; font-size: 0.6rem;
            letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: 0.3s;
        }
        #slideshow-btn.active { background: #fff; color: #000; font-weight: 700; }

        .controls-hint {
            left: 40px; display: flex; flex-direction: column; gap: 4px; opacity: 0.9;
        }
        .key-row { display: flex; gap: 4px; }
        .key {
            width: 24px; height: 24px; border-radius: 4px;
            background: rgba(255,255,255,0.15); border: 1.5px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,1); /* Essential for visibility against white HDR */
        }
        .key::after { content: ''; border: solid #fff; border-width: 0 2px 2px 0; padding: 2.5px; }
        .u::after { transform: rotate(-135deg); } .d::after { transform: rotate(45deg); }
        .l::after { transform: rotate(135deg); } .r::after { transform: rotate(-45deg); }

        @media (max-width: 768px) { .controls-hint { display: none; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="grain"></div>

    <div id="main-wrapper">
        <header>
            <h1>Ultra HDR Portfolio</h1>
            <div class="credit">Photographed by Clarence • 2023–2025</div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div class="nav-ui" style="left:40px;"><div class="controls-hint">
        <div class="key-row" style="justify-content:center"><div class="key u"></div></div>
        <div class="key-row"><div class="key l"></div><div class="key d"></div><div class="key r"></div></div>
    </div></div>

    <button id="slideshow-btn" style="position:fixed; bottom:40px; right:40px;">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const total = 39;
        let current = 0;
        let auto = false;
        let timer;

        // 2. PERFORMANCE: Fragment-based DOM generation
        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            fragment.appendChild(s);
        }
        root.appendChild(fragment);

        const slides = document.querySelectorAll('header, section');

        function move(idx) {
            if (idx < 0 || idx >= slides.length) return;
            current = idx;
            wrapper.style.transform = `translate3d(0, -${idx * 100}vh, 0)`; // GPU Acceleration
            preload(idx + 1); // Pre-fetch the next image
        }

        // 3. QUALITY: Smart Preloading
        function preload(idx) {
            if (idx >= slides.length) return;
            const target = slides[idx].querySelector('.photo-container');
            if (target && !target.innerHTML) {
                const id = slides[idx].dataset.id;
                if (id) target.innerHTML = `<img src="img-${id}.avif" loading="eager">`;
            }
        }

        // 4. PERFORMANCE: Debounced Scroll & Key
        let isLocked = false;
        const handleNav = (dir) => {
            if (isLocked) return;
            isLocked = true;
            if (auto) toggle();
            move(current + dir);
            setTimeout(() => isLocked = false, 800);
        };

        window.addEventListener('wheel', e => handleNav(e.deltaY > 0 ? 1 : -1), { passive: true });
        window.addEventListener('keydown', e => {
            if (e.key.includes("Arrow")) handleNav((e.key==="ArrowDown" || e.key==="ArrowRight") ? 1 : -1);
        });

        const btn = document.getElementById('slideshow-btn');
        function toggle() {
            auto = !auto;
            btn.classList.toggle('active');
            btn.innerText = auto ? "Stop Slideshow" : "Start Slideshow";
            if (auto) timer = setInterval(() => move((current + 1) % slides.length), 5000);
            else clearInterval(timer);
        }
        btn.addEventListener('click', toggle);

        // Initial Preload
        preload(1);
    </script>
</body>
</html>
