<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #000; --glass: rgba(15, 15, 15, 0.75); --ui: rgba(255, 255, 255, 0.95); }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 1. TIGHT FILMSTRIP SCROLL (10% PEEK) */
        #main-wrapper {
            height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory;
            scroll-behavior: auto; /* Changed to auto for instant scrubbing sync */
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        #main-wrapper::-webkit-scrollbar { display: none; }

        header, section {
            height: 80vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; scroll-snap-align: center;
            scroll-snap-stop: always; position: relative;
        }
        header { height: 100vh; }

        .header-content { text-align: center; transition: opacity 0.5s ease; margin-bottom: 40px; }
        h1 { font-size: 0.8rem; font-weight: 300; letter-spacing: 0.9em; text-transform: uppercase; margin: 0; }

        .photo-container { 
            width: 90%; height: 70vh; display: flex; justify-content: center; align-items: center;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), filter 0.6s ease;
            filter: brightness(0.65) blur(1px); transform: scale(0.94);
            will-change: transform, filter;
        }
        .active .photo-container { filter: brightness(1) blur(0px); transform: scale(1); }
        img { max-width: 100%; max-height: 100%; border-radius: 2px; box-shadow: 0 40px 120px rgba(0,0,0,1); }

        /* 2. REAL-TIME iOS SCRUBBER */
        #ui-trigger-zone { position: fixed; bottom: 0; left: 0; width: 100%; height: 140px; z-index: 10001; }
        
        #thumb-slider {
            position: fixed; bottom: 35px; left: 50%; transform: translate3d(-50%, 60px, 0);
            width: 90%; max-width: 550px; height: 70px; z-index: 10002;
            display: flex; align-items: center; gap: 10px; overflow-x: auto;
            padding: 0 50%; /* Allows first/last to center */
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 22px; border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; transition: all 0.5s cubic-bezier(0.15, 1, 0.3, 1);
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        #thumb-slider::-webkit-scrollbar { display: none; }
        
        #ui-trigger-zone:hover ~ #thumb-slider, #thumb-slider:hover { 
            opacity: 1; transform: translate3d(-50%, 0, 0); 
        }

        .thumb {
            flex: 0 0 32px; height: 22px; background-size: cover; background-position: center;
            border-radius: 4px; transition: all 0.3s cubic-bezier(0.2, 1, 0.2, 1);
            opacity: 0.4; filter: brightness(0.7); scroll-snap-align: center;
            will-change: flex, height;
        }
        .thumb.active-thumb { flex: 0 0 44px; height: 44px; opacity: 1; filter: brightness(1); border-radius: 6px; }

        #slideshow-btn {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 10px 22px; border-radius: 40px; font-size: 0.6rem;
            letter-spacing: 0.2em; cursor: pointer; backdrop-filter: blur(15px);
        }

        @media (max-width: 768px) {
            header, section { height: 80vh; } header { height: 100vh; }
            .photo-container { height: 60vh; }
            #thumb-slider { height: 60px; bottom: 25px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active" data-id="1">
            <div class="header-content" id="title-block">
                <h1>Ultra HDR Portfolio</h1>
                <div class="credit">Photographed by Clarence • 2023–2025</div>
            </div>
            <div class="photo-container"><img src="img-1.avif"></div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div id="ui-trigger-zone"></div>
    <div id="thumb-slider"></div>
    <button id="slideshow-btn">AUTO</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const slider = document.getElementById('thumb-slider');
        const titleBlock = document.getElementById('title-block');
        const total = 39;
        let isAuto = false, isUserScrubbing = false, timer;

        // 1. DOM Build
        const frag = document.createDocumentFragment();
        for (let i = 2; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            frag.appendChild(s);
        }
        root.appendChild(frag);

        for (let i = 1; i <= total; i++) {
            const t = document.createElement('div');
            t.className = 'thumb';
            t.style.backgroundImage = `url(img-${i}.avif)`;
            t.onclick = () => {
                isUserScrubbing = true;
                items[i-1].scrollIntoView({ behavior: 'smooth' });
                setTimeout(() => isUserScrubbing = false, 1000);
            };
            slider.appendChild(t);
        }

        const items = document.querySelectorAll('header, section');
        const thumbs = document.querySelectorAll('.thumb');

        // 2. LIVE SCRUBBING SYNC (Fixed Center Point)
        const syncSlider = () => {
            if (isUserScrubbing || isAuto) return;
            
            const sliderCenter = slider.scrollLeft + (slider.offsetWidth / 2);
            let activeIdx = 0;
            let minDistance = Infinity;

            thumbs.forEach((thumb, i) => {
                const thumbCenter = thumb.offsetLeft + (thumb.offsetWidth / 2);
                const distance = Math.abs(sliderCenter - thumbCenter);
                if (distance < minDistance) {
                    minDistance = distance;
                    activeIdx = i;
                }
            });

            // INSTANTLY display corresponding main photo
            items[activeIdx].scrollIntoView({ behavior: 'auto' });
        };

        slider.addEventListener('scroll', syncSlider, { passive: true });

        // 3. MAIN OBSERVER (Syncs Slider to Main Scroll)
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const idx = [...items].indexOf(entry.target);
                    entry.target.classList.add('active');
                    
                    // Sync slider thumb
                    thumbs.forEach(t => t.classList.remove('active-thumb'));
                    thumbs[idx].classList.add('active-thumb');
                    
                    // Scroll slider to center this thumb
                    if (!slider.matches(':hover')) {
                        thumbs[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }

                    titleBlock.style.opacity = idx === 0 ? "1" : "0";

                    const container = entry.target.querySelector('.photo-container');
                    if (entry.target.dataset.id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${entry.target.dataset.id}.avif">`;
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.51 });

        items.forEach(i => obs.observe(i));

        // 4. CONTROLS
        const btn = document.getElementById('slideshow-btn');
        btn.onclick = () => {
            isAuto = !isAuto;
            btn.style.background = isAuto ? "#fff" : "var(--glass)";
            btn.style.color = isAuto ? "#000" : "#fff";
            if (isAuto) {
                timer = setInterval(() => {
                    const curr = [...items].indexOf(document.querySelector('.active'));
                    items[(curr + 1) % items.length].scrollIntoView({ behavior: 'smooth' });
                }, 4000);
            } else clearInterval(timer);
        };

        window.onkeydown = (e) => {
            const curr = [...items].indexOf(document.querySelector('.active'));
            if (e.key === "ArrowDown" || e.key === "ArrowRight") items[Math.min(curr + 1, total-1)].scrollIntoView({ behavior: 'smooth' });
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") items[Math.max(curr - 1, 0)].scrollIntoView({ behavior: 'smooth' });
        };

        wrapper.onwheel = () => { if(isAuto) btn.click(); };
    </script>
</body>
</html>
