<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.7); 
            --ui: rgba(255, 255, 255, 0.9);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. INFINITE STRIP WITH 7.5% PEEK */
        #main-wrapper {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* 85vh height ensures (100 - 85) / 2 = 7.5% visibility for neighbors */
        header, section {
            height: 85vh; 
            width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            scroll-snap-align: center; 
            scroll-snap-stop: always;
            position: relative;
        }

        /* Title Page - Full Screen & Detached Centering */
        header { 
            height: 100vh; 
            gap: 30px; /* Space between title and img-1 */
        }
        
        .header-content {
            text-align: center;
            transition: opacity 0.8s ease;
        }
        
        h1 { font-size: 0.8rem; font-weight: 300; letter-spacing: 0.9em; text-transform: uppercase; margin: 0; }
        .credit { color: rgba(255,255,255,0.4); font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 15px; }

        /* 2. FOCUS SETTINGS */
        .photo-container { 
            width: 90%; 
            height: 70vh; 
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.2, 1), 
                        filter 1.2s ease, 
                        opacity 1.2s ease;
            filter: brightness(0.5) blur(2px); 
            opacity: 0.8;
            transform: scale(0.95);
            will-change: transform, filter, opacity;
        }

        .active .photo-container {
            filter: brightness(1) blur(0px);
            opacity: 1;
            transform: scale(1);
        }

        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: cinematicFloat 20s ease-in-out infinite;
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: scale(1.02); }
            50% { transform: scale(1.05) translateY(-10px); }
        }

        /* UI */
        #slideshow-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 24px; border-radius: 50px;
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #slideshow-btn.active { background: #fff; color: #000; font-weight: 700; }

        @media (max-width: 768px) { 
            header, section { height: 85vh; } 
            header { height: 100vh; }
            .photo-container { width: 95%; height: 65vh; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active">
            <div class="header-content" id="title-block">
                <h1>Ultra HDR Portfolio</h1>
                <div class="credit">Photographed by Clarence • 2023–2025</div>
            </div>
            <!-- Img-1 Centered on Title Page -->
            <div class="photo-container">
                <img src="img-1.avif">
            </div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const titleBlock = document.getElementById('title-block');
        const total = 39;
        let autoPlay = false;
        let slideTimer;

        // Build Sections from img-2 onwards
        for (let i = 2; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(s);
        }

        const items = document.querySelectorAll('header, section');

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    
                    // Toggle title visibility based on header
                    titleBlock.style.opacity = entry.target.tagName === 'HEADER' ? "1" : "0";

                    const id = entry.target.dataset.id;
                    const container = entry.target.querySelector('.photo-container');
                    if (id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif">`;
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.5 });

        items.forEach(i => obs.observe(i));

        function goTo(idx) {
            if (idx < 0 || idx >= items.length) return;
            items[idx].scrollIntoView({ behavior: 'smooth' });
        }

        // Slideshow Logic
        const btn = document.getElementById('slideshow-btn');
        btn.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btn.classList.toggle('active');
            btn.innerText = autoPlay ? "Stop Slideshow" : "Start Slideshow";
            if (autoPlay) {
                slideTimer = setInterval(() => {
                    const current = [...items].indexOf(document.querySelector('.active'));
                    const next = (current + 1) % items.length;
                    goTo(next);
                }, 4000);
            } else {
                clearInterval(slideTimer);
            }
        });

        // Kill auto-play on user input
        wrapper.addEventListener('touchstart', () => { if(autoPlay) btn.click(); });
        wrapper.addEventListener('wheel', () => { if(autoPlay) btn.click(); });
    </script>
</body>
</html>
