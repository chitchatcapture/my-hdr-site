<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #000; --text: #fff; --glass: rgba(20, 20, 20, 0.7); }
        
        body, html { 
            background: var(--bg); color: var(--text); margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden; height: 100%;
            /* Apple-style Snap Scroll */
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Anti-Theft Protection */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }

        /* Cinematic Header */
        header { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            scroll-snap-align: start;
        }
        
        h1 { font-size: 0.8rem; font-weight: 400; letter-spacing: 0.6em; text-transform: uppercase; margin: 0; opacity: 0.8; }
        .credit { color: #444; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 25px; }

        /* Full-Screen Image Sections */
        section {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            scroll-snap-align: start; position: relative;
            overflow: hidden;
        }

        .photo-container {
            width: 85%; height: 80vh;
            display: flex; justify-content: center; align-items: center;
        }

        img {
            max-width: 100%; max-height: 100%;
            border-radius: 2px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.95);
            -webkit-user-drag: none; pointer-events: none;
            /* The "Floating" Parallax Animation */
            animation: cinematicFloat 18s ease-in-out infinite;
            transition: opacity 1.5s ease;
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: scale(1.03) translateY(0) rotate(0.05deg); }
            50% { transform: scale(1.06) translateY(-12px) rotate(-0.05deg); }
        }

        /* Premium Frosted Glass Toggle */
        #slideshow-btn {
            position: fixed; bottom: 40px; right: 40px; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff; padding: 14px 28px; border-radius: 50px;
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #slideshow-btn:hover { background: #fff; color: #000; border-color: #fff; }
        #slideshow-btn.active { 
            background: #fff; color: #000; 
            box-shadow: 0 0 30px rgba(255,255,255,0.15); 
        }

        /* Phone Specific Adjustments */
        @media (max-width: 768px) {
            .photo-container { width: 92%; height: 75vh; }
            #slideshow-btn { bottom: 30px; right: 20px; padding: 12px 22px; font-size: 0.55rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Ultra HDR Portfolio</h1>
        <div class="credit">Photographed by Clarence • 2023–2025</div>
    </header>

    <div id="gallery-root"></div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const totalImages = 39;
        let autoPlayActive = false;
        let slideTimer;

        // 1. Build the Gallery Sections
        for (let i = 1; i <= totalImages; i++) {
            const sec = document.createElement('section');
            sec.innerHTML = `<div class="photo-container"><img src="img-${i}.avif" loading="lazy"></div>`;
            root.appendChild(sec);
        }

        const btn = document.getElementById('slideshow-btn');

        // 2. The Slideshow Engine (4s dwell + 1s transition)
        function nextSlide() {
            const currentIdx = Math.round(window.scrollY / window.innerHeight);
            const nextIdx = (currentIdx + 1) % (totalImages + 1);
            
            window.scrollTo({
                top: nextIdx * window.innerHeight,
                behavior: 'smooth'
            });
        }

        function toggleSlideshow() {
            autoPlayActive = !autoPlayActive;
            
            if (autoPlayActive) {
                btn.innerText = "Stop Slideshow";
                btn.classList.add('active');
                // Wait 4 seconds on current image before starting first move
                slideTimer = setInterval(nextSlide, 5000); 
            } else {
                btn.innerText = "Start Slideshow";
                btn.classList.remove('active');
                clearInterval(slideTimer);
            }
        }

        btn.addEventListener('click', toggleSlideshow);

        // 3. User Intelligence: If user scrolls manually, stop the show
        window.addEventListener('wheel', () => {
            if (autoPlayActive) toggleSlideshow();
        }, { passive: true });

        window.addEventListener('touchstart', () => {
            if (autoPlayActive) toggleSlideshow();
        }, { passive: true });
    </script>
</body>
</html>
