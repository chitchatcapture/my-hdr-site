<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.7); 
            --ui: rgba(255, 255, 255, 0.9);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* INFINITE FILMSTRIP SCROLL */
        #main-wrapper {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        header, section {
            height: 70vh; 
            width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            scroll-snap-align: center; 
            scroll-snap-stop: always;
            position: relative;
        }

        /* Cover Page Layout */
        header { 
            height: 100vh; /* Full screen for the landing */
            justify-content: flex-end; /* Pushes content slightly down */
            padding-bottom: 5vh;
        }
        
        .header-content {
            margin-bottom: 40px;
            text-align: center;
            transition: opacity 0.8s ease; /* For the fade-out effect */
        }
        
        h1 { font-size: 0.8rem; font-weight: 300; letter-spacing: 0.9em; text-transform: uppercase; margin: 0; }
        .credit { color: rgba(255,255,255,0.4); font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 20px; }

        /* REFINED FOCUS (LESS BLUR, LESS DIM) */
        .photo-container { 
            width: 90%; 
            height: 65vh; 
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.2, 1), 
                        filter 1.2s ease, 
                        opacity 1.2s ease;
            filter: brightness(0.5) blur(2px); 
            opacity: 0.75;
            transform: scale(0.94);
            will-change: transform, filter, opacity;
        }

        .active .photo-container {
            filter: brightness(1) blur(0px);
            opacity: 1;
            transform: scale(1);
        }

        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: cinematicFloat 20s ease-in-out infinite;
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: scale(1.02); }
            50% { transform: scale(1.05) translateY(-10px); }
        }

        /* UI CONTROLS */
        #slideshow-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 24px; border-radius: 50px;
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #slideshow-btn.active { background: #fff; color: #000; font-weight: 700; }

        .controls-hint {
            position: fixed; bottom: 30px; left: 30px; z-index: 10000;
            display: none; flex-direction: column; gap: 5px; opacity: 0.8;
        }
        @media (min-width: 801px) { .controls-hint { display: flex; } }
        
        .key {
            width: 24px; height: 24px; border: 1.5px solid var(--ui); border-radius: 5px;
            background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        }
        .key::after { content: ''; border: solid #fff; border-width: 0 2px 2px 0; padding: 2.5px; }
        .u::after { transform: rotate(-135deg); } .d::after { transform: rotate(45deg); }
        .l::after { transform: rotate(135deg); } .r::after { transform: rotate(-45deg); }

        @media (max-width: 768px) { 
            header, section { height: 60vh; } 
            header { height: 100vh; padding-bottom: 2vh; }
            .photo-container { width: 95%; height: 55vh; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active">
            <div class="header-content" id="title-block">
                <h1>Ultra HDR Portfolio</h1>
                <div class="credit">Photographed by Clarence • 2023–2025</div>
            </div>
            <!-- First Image placed directly under the title -->
            <div class="photo-container">
                <img src="img-1.avif">
            </div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div class="controls-hint">
        <div style="display:flex; justify-content:center;"><div class="key u"></div></div>
        <div style="display:flex; gap:5px;"><div class="key l"></div><div class="key d"></div><div class="key r"></div></div>
    </div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const titleBlock = document.getElementById('title-block');
        const total = 39;
        let autoPlay = false;
        let slideTimer;

        // Build Sections (Start from img-2)
        for (let i = 2; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(s);
        }

        const items = document.querySelectorAll('header, section');

        // Observer for focus and title fade-out
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    
                    // Fade title out if we move past the header
                    if (entry.target.tagName === 'HEADER') {
                        titleBlock.style.opacity = "1";
                    } else {
                        titleBlock.style.opacity = "0";
                    }

                    const id = entry.target.dataset.id;
                    const container = entry.target.querySelector('.photo-container');
                    if (id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif">`;
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.4 });

        items.forEach(i => obs.observe(i));

        function goTo(idx) {
            if (idx < 0 || idx >= items.length) return;
            items[idx].scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('keydown', (e) => {
            const current = [...items].indexOf(document.querySelector('.active'));
            if (e.key === "ArrowDown" || e.key === "ArrowRight") goTo(current + 1);
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") goTo(current - 1);
        });

        const btn = document.getElementById('slideshow-btn');
        btn.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btn.classList.toggle('active');
            btn.innerText = autoPlay ? "Stop Slideshow" : "Start Slideshow";
            if (autoPlay) {
                slideTimer = setInterval(() => {
                    const current = [...items].indexOf(document.querySelector('.active'));
                    const next = (current + 1) % items.length;
                    goTo(next);
                }, 4000);
            } else {
                clearInterval(slideTimer);
            }
        });

        wrapper.addEventListener('touchstart', () => { if(autoPlay) btn.click(); });
        wrapper.addEventListener('wheel', () => { if(autoPlay) btn.click(); });
    </script>
</body>
</html>
