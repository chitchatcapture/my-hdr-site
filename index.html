<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #000; --accent: #fff; }
        
        body, html { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden; height: 100%;
            /* Snap Scroll Logic */
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Protection */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }

        header { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            scroll-snap-align: start;
        }
        
        h1 { font-size: 0.8rem; font-weight: 400; letter-spacing: 0.6em; text-transform: uppercase; margin: 0; opacity: 0.8; }
        .credit { color: #444; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 20px; }

        /* Gallery Sections */
        section {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            scroll-snap-align: start; position: relative;
            overflow: hidden;
        }

        .photo-container {
            width: 85%; height: 80vh;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        img {
            max-width: 100%; max-height: 100%;
            border-radius: 2px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            -webkit-user-drag: none; pointer-events: none;
            /* Floating Motion Animation */
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: scale(1.02) translateY(0) rotate(0.1deg); }
            50% { transform: scale(1.05) translateY(-15px) rotate(-0.1deg); }
        }

        /* Premium Toggle Button */
        #auto-toggle {
            position: fixed; bottom: 40px; right: 40px; z-index: 100;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px 24px; border-radius: 40px;
            font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #auto-toggle:hover { background: #fff; color: #000; }
        #auto-toggle.active { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* Mobile specific */
        @media (max-width: 768px) {
            .photo-container { width: 92%; height: 70vh; }
            #auto-toggle { bottom: 30px; right: 20px; padding: 10px 18px; font-size: 0.55rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Ultra HDR Portfolio</h1>
        <div class="credit">Photographed by Clarence • 2023–2025</div>
    </header>

    <div id="gallery-root"></div>

    <button id="auto-toggle">Auto: Off</button>

    <script>
        const root = document.getElementById('gallery-root');
        const totalImages = 39;
        let isAuto = false;
        let autoInterval;

        // Generate Sections
        for (let i = 1; i <= totalImages; i++) {
            const sec = document.createElement('section');
            sec.innerHTML = `<div class="photo-container"><img src="img-${i}.avif" loading="lazy"></div>`;
            root.appendChild(sec);
        }

        // Auto-Play Logic
        const btn = document.getElementById('auto-toggle');
        
        function startAuto() {
            autoInterval = setInterval(() => {
                const current = Math.round(window.scrollY / window.innerHeight);
                const next = (current + 1) % (totalImages + 1);
                window.scrollTo({ top: next * window.innerHeight, behavior: 'smooth' });
            }, 5000);
        }

        btn.addEventListener('click', () => {
            isAuto = !isAuto;
            btn.classList.toggle('active');
            btn.innerText = isAuto ? "Auto: On" : "Auto: Off";
            if (isAuto) startAuto(); else clearInterval(autoInterval);
        });

        // Optional: Stop auto-play if user manually scrolls
        window.addEventListener('wheel', () => {
            if (isAuto) {
                isAuto = false;
                clearInterval(autoInterval);
                btn.classList.remove('active');
                btn.innerText = "Auto: Off";
            }
        }, { passive: true });
    </script>
</body>
</html>
