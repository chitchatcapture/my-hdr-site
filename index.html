<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDR Portfolio</title>
    <style>
        :root { --bg: #050505; --accent: #fff; --text-muted: #888; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 80px 20px; }
        h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; }
        #gallery { width: 100%; max-width: 1200px; padding: 0 20px 100px 20px; display: flex; flex-direction: column; gap: 80px; margin: auto; }
        .photo-wrapper { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .photo-wrapper.visible { opacity: 1; transform: translateY(0); }
        img { width: 100%; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <header>
        <h1>Ultra HDR Portfolio</h1>
        <div style="color: #888;">Captured in 10-bit AVIF</div>
    </header>
    <div id="gallery"></div>
    <script>
        const gallery = document.getElementById('gallery');
        const totalImages = 39; 
        for (let i = 1; i <= totalImages; i++) {
            const div = document.createElement('div');
            div.className = 'photo-wrapper';
            div.innerHTML = `<img src="img-${i}.avif" loading="lazy">`;
            gallery.appendChild(div);
        }
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.photo-wrapper').forEach(img => observer.observe(img));
    </script>
</body>
</html>
