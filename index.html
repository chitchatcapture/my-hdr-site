<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ULTRA HDR • CLARENCE</title>
    <link rel="preload" href="img-1.avif" as="image" fetchpriority="high">
    <style>
        :root { --bg: #000; --glass: rgba(12, 12, 12, 0.75); --border: rgba(255, 255, 255, 0.12); }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100dvh; width: 100%; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        #main-wrapper {
            height: 100dvh; overflow-y: auto; scroll-snap-type: y mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        #main-wrapper::-webkit-scrollbar { display: none; }

        header, section {
            height: 100dvh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; scroll-snap-align: center;
            scroll-snap-stop: always; position: relative;
        }

        .photo-container { 
            width: 90%; height: 70vh; display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1.2s ease;
            filter: brightness(0.6) blur(2px); transform: scale(0.92);
        }
        
        .active .photo-container { filter: brightness(1.1) blur(0px); transform: scale(1); }
        header.active .photo-container { transition: none !important; filter: brightness(1.1) blur(0px) !important; transform: scale(1) !important; }

        img { max-width: 100%; max-height: 100%; border-radius: 2px; box-shadow: 0 40px 140px rgba(0,0,0,1); }

        /* iOS STRIP SYSTEM */
        #thumb-slider {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 550px; height: 80px; z-index: 10002;
            display: flex; align-items: center; overflow-x: auto;
            background: var(--glass); backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border-radius: 24px; border: 1px solid var(--border);
            scrollbar-width: none; scroll-snap-type: x mandatory;
        }
        #thumb-slider::-webkit-scrollbar { display: none; }

        .slider-rail { display: flex; align-items: center; gap: 12px; height: 100%; width: max-content; }
        
        /* Fixed Buffer Logic for dead-centering first and last */
        .buffer { width: calc(275px - 22px); flex-shrink: 0; } 
        @media (max-width: 600px) { .buffer { width: calc(46vw - 22px); } }

        .thumb {
            flex: 0 0 34px; height: 22px; background-size: cover; background-position: center;
            border-radius: 4px; transition: all 0.3s ease;
            opacity: 0.35; filter: brightness(0.7); scroll-snap-align: center;
        }
        .thumb.active-thumb { flex: 0 0 44px; height: 44px; opacity: 1; filter: brightness(1); border-radius: 6px; }

        #slideshow-btn {
            position: fixed; top: 30px; right: 30px; z-index: 10000;
            background: var(--glass); border: 1px solid var(--border);
            color: #fff; padding: 10px 22px; border-radius: 40px; font-size: 0.6rem;
            letter-spacing: 0.3em; cursor: pointer;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active" data-id="1">
            <div class="photo-container"><img src="img-1.avif"></div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div id="thumb-slider">
        <div class="slider-rail">
            <div class="buffer"></div>
            <div id="thumb-root" style="display:flex; align-items:center; gap:12px;"></div>
            <div class="buffer"></div>
        </div>
    </div>
    
    <button id="slideshow-btn">AUTO</button>

    <script>
        const root = document.getElementById('gallery-root');
        const thumbRoot = document.getElementById('thumb-root');
        const wrapper = document.getElementById('main-wrapper');
        const slider = document.getElementById('thumb-slider');
        const total = 39;
        let lastIdx = 0;
        let isTouchingSlider = false;

        // 1. Build DOM
        const frag = document.createDocumentFragment();
        for (let i = 2; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            frag.appendChild(s);
        }
        root.appendChild(frag);

        for (let i = 1; i <= total; i++) {
            const t = document.createElement('div');
            t.className = 'thumb';
            t.style.backgroundImage = `url(img-${i}.avif)`;
            t.onclick = () => { 
                items[i-1].scrollIntoView({ behavior: 'smooth' }); 
            };
            thumbRoot.appendChild(t);
        }

        const items = document.querySelectorAll('header, section');
        const thumbs = document.querySelectorAll('.thumb');

        const updateUI = (idx) => {
            if (lastIdx === idx && items[idx].classList.contains('active')) return;
            lastIdx = idx;
            items.forEach((it, i) => it.classList.toggle('active', i === idx));
            thumbs.forEach((th, i) => th.classList.toggle('active-thumb', i === idx));
            
            const c = items[idx].querySelector('.photo-container');
            if (c && !c.innerHTML) {
                const id = items[idx].dataset.id || 1;
                c.innerHTML = `<img src="img-${id}.avif">`;
            }
        };

        // 2. DEAD CENTRE SYNC ENGINE
        const sync = () => {
            if (isTouchingSlider) {
                // If user touches the strip, strip controls the gallery
                const sliderCenter = slider.scrollLeft + (slider.offsetWidth / 2);
                let closestIdx = 0;
                let minDist = Infinity;

                thumbs.forEach((t, i) => {
                    const tCenter = t.offsetLeft + (t.offsetWidth / 2);
                    const d = Math.abs(sliderCenter - tCenter);
                    if (d < minDist) { minDist = d; closestIdx = i; }
                });

                if (lastIdx !== closestIdx) {
                    updateUI(closestIdx);
                    // Jump gallery to match strip
                    wrapper.scrollTo({ top: items[closestIdx].offsetTop, behavior: 'auto' });
                }
            } else {
                // If user scrolls the gallery, gallery controls the strip
                const mainCenter = wrapper.scrollTop + (window.innerHeight / 2);
                items.forEach((item, i) => {
                    const center = item.offsetTop + (item.offsetHeight / 2);
                    if (Math.abs(mainCenter - center) < 100) {
                        if (lastIdx !== i) {
                            updateUI(i);
                            thumbs[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        }
                    }
                });
            }
            requestAnimationFrame(sync);
        };

        // Input Listeners
        slider.addEventListener('touchstart', () => isTouchingSlider = true);
        slider.addEventListener('mousedown', () => isTouchingSlider = true);
        window.addEventListener('touchend', () => isTouchingSlider = false);
        window.addEventListener('mouseup', () => isTouchingSlider = false);

        requestAnimationFrame(sync);

        // Auto Button logic (Simplified for space)
        let isAuto = false, autoTimer;
        document.getElementById('slideshow-btn').onclick = function() {
            isAuto = !isAuto;
            this.style.background = isAuto ? "#fff" : "var(--glass)";
            this.style.color = isAuto ? "#000" : "#fff";
            if (isAuto) {
                autoTimer = setInterval(() => {
                    const next = (lastIdx + 1) % items.length;
                    items[next].scrollIntoView({ behavior: 'smooth' });
                }, 4000);
            } else clearInterval(autoTimer);
        };
    </script>
</body>
</html>
