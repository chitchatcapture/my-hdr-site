<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.7); 
            --ui: rgba(255, 255, 255, 0.9);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. TIGHT SCROLL SNAP PEAKING */
        #main-wrapper {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Section height at 70vh ensures 15% of prev/next is always on screen */
        header, section {
            height: 70vh; 
            width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            scroll-snap-align: center; 
            scroll-snap-stop: always;
            position: relative;
            margin: 0; /* Removed margins to bring them closer */
        }

        /* Initial Landing Header */
        header { height: 100vh; }
        
        h1 { font-size: 0.75rem; font-weight: 300; letter-spacing: 0.8em; text-transform: uppercase; opacity: 0.6; }
        .credit { color: #333; font-size: 0.5rem; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 30px; }

        /* 2. FOCUS & DIMMING (IMAGE DISTANCE) */
        .photo-container { 
            width: 90%; 
            height: 65vh; /* Image height slightly smaller than section for tight gap */
            display: flex; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.2, 1, 0.2, 1), 
                        filter 1s ease, 
                        opacity 1s ease;
            filter: brightness(0.15) blur(8px); /* Darker neighbors for focus */
            opacity: 0.3;
            transform: scale(0.88);
            will-change: transform, filter, opacity;
        }

        /* Active Photo Spotlight */
        section.active .photo-container {
            filter: brightness(1) blur(0px);
            opacity: 1;
            transform: scale(1);
        }

        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            animation: cinematicFloat 20s ease-in-out infinite;
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: scale(1.02); }
            50% { transform: scale(1.04) translateY(-8px); }
        }

        /* UI ELEMENTS */
        #slideshow-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 22px; border-radius: 50px;
            font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        #slideshow-btn.active { background: #fff; color: #000; font-weight: 700; }

        .controls-hint {
            position: fixed; bottom: 30px; left: 30px; z-index: 10000;
            display: none; flex-direction: column; gap: 4px; opacity: 0.8;
        }
        @media (min-width: 801px) { .controls-hint { display: flex; } }
        
        .key {
            width: 22px; height: 22px; border: 1.2px solid var(--ui); border-radius: 4px;
            background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        }
        .key::after { content: ''; border: solid #fff; border-width: 0 2px 2px 0; padding: 2px; }
        .u::after { transform: rotate(-135deg); } .d::after { transform: rotate(45deg); }
        .l::after { transform: rotate(135deg); } .r::after { transform: rotate(-45deg); }

        @media (max-width: 768px) { 
            header, section { height: 60vh; } /* Tighter peek on mobile */
            header { height: 100vh; }
            .photo-container { width: 95%; height: 55vh; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active">
            <h1>Ultra HDR Portfolio</h1>
            <div class="credit">Photographed by Clarence • 2023–2025</div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div class="controls-hint">
        <div style="display:flex; justify-content:center;"><div class="key u"></div></div>
        <div style="display:flex; gap:5px;"><div class="key l"></div><div class="key d"></div><div class="key r"></div></div>
    </div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const total = 39;
        let autoPlay = false;
        let slideTimer;

        // Generate Sections
        for (let i = 1; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(s);
        }

        const sections = document.querySelectorAll('header, section');

        // FOCUS TRACKING
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const id = entry.target.dataset.id;
                    const container = entry.target.querySelector('.photo-container');
                    if (id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif">`;
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.5 });

        sections.forEach(s => obs.observe(s));

        // Navigation helper
        function goTo(idx) {
            if (idx < 0 || idx >= sections.length) return;
            sections[idx].scrollIntoView({ behavior: 'smooth' });
        }

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            const current = [...sections].indexOf(document.querySelector('.active'));
            if (e.key === "ArrowDown" || e.key === "ArrowRight") goTo(current + 1);
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") goTo(current - 1);
        });

        // Slideshow Logic
        const btn = document.getElementById('slideshow-btn');
        btn.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btn.classList.toggle('active');
            btn.innerText = autoPlay ? "Stop Slideshow" : "Start Slideshow";
            if (autoPlay) {
                slideTimer = setInterval(() => {
                    const current = [...sections].indexOf(document.querySelector('.active'));
                    const next = (current + 1) % sections.length;
                    goTo(next);
                }, 4000);
            } else {
                clearInterval(slideTimer);
            }
        });

        // Interrupt auto-play on interaction
        wrapper.addEventListener('touchstart', () => { if(autoPlay) btn.click(); });
        wrapper.addEventListener('wheel', () => { if(autoPlay) btn.click(); });
    </script>
</body>
</html>
