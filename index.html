<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra HDR Gallery</title>
    <style>
        /* Colors for the Light and Dark themes */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #eeeeee;
            --accent: #555;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f4;
            --text-color: #222222;
            --accent: #ccc;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: all 0.3s ease; /* Smooth fade when switching */
            font-family: sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container { max-width: 1000px; margin: auto; }

        /* The Button Style */
        #theme-toggle {
            background: var(--accent);
            color: var(--text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 30px;
            font-size: 14px;
        }

        picture img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- The Switch Button -->
        <button id="theme-toggle">Switch to Light Mode</button>

        <h1>Ultra HDR Photography</h1>

        <picture>
            <source srcset="images/photo-hdr.avif" type="image/avif">
            <img src="images/photo-sdr.jpg" alt="HDR Landscape Preview">
        </picture>
        
        <p style="margin-top: 20px; opacity: 0.6;">View on Chrome/Edge with an HDR screen for full brightness.</p>
    </div>

    <!-- The JavaScript for the switch -->
    <script>
        const btn = document.getElementById("theme-toggle");
        const body = document.body;

        btn.addEventListener("click", () => {
            if (body.getAttribute("data-theme") === "light") {
                body.removeAttribute("data-theme");
                btn.innerText = "Switch to Light Mode";
            } else {
                body.setAttribute("data-theme", "light");
                btn.innerText = "Switch to Dark Mode";
            }
        });
    </script>

</body>
</html>
