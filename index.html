<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.7); 
            --ui: rgba(255, 255, 255, 0.9);
        }
        
        html, body { 
            background: var(--bg); color: #fff; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100%; width: 100%; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. NATIVE SCROLL SNAP: This makes mobile feel "Natural" */
        #main-wrapper {
            height: 100vh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        header, section {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
        }
        
        h1 { font-size: 0.75rem; font-weight: 300; letter-spacing: 0.8em; text-transform: uppercase; opacity: 0.5; }
        .credit { color: #333; font-size: 0.5rem; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 30px; }

        .photo-container { 
            width: 90%; height: 80vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }

        /* 2. SMOOTH FADE-IN ANIMATION */
        img {
            max-width: 100%; max-height: 100%; border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            will-change: opacity, transform;
        }

        /* Triggered when slide is in view */
        section.active img {
            opacity: 1;
            transform: scale(1.02);
            animation: cinematicFloat 20s ease-in-out infinite;
        }

        @keyframes cinematicFloat {
            50% { transform: scale(1.05) translateY(-10px); }
        }

        /* UI CONTROLS */
        #slideshow-btn {
            position: fixed; bottom: 35px; right: 35px; z-index: 10000;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px 26px; border-radius: 50px;
            font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 10px 40px rgba(0,0,0,0.8); transition: 0.3s;
        }
        #slideshow-btn.active { background: #fff; color: #000; font-weight: 700; }

        .controls-hint {
            position: fixed; bottom: 35px; left: 35px; z-index: 10000;
            display: none; flex-direction: column; gap: 5px; opacity: 0.8;
        }
        @media (min-width: 801px) { .controls-hint { display: flex; } }
        
        .key {
            width: 24px; height: 24px; border: 1.5px solid var(--ui); border-radius: 5px;
            background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        }
        .key::after { content: ''; border: solid #fff; border-width: 0 2px 2px 0; padding: 2.5px; }
        .u::after { transform: rotate(-135deg); } .d::after { transform: rotate(45deg); }
        .l::after { transform: rotate(135deg); } .r::after { transform: rotate(-45deg); }

        @media (max-width: 768px) { .photo-container { width: 95%; height: 70vh; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-wrapper">
        <header class="active">
            <h1>Ultra HDR Portfolio</h1>
            <div class="credit">Photographed by Clarence • 2023–2025</div>
        </header>
        <div id="gallery-root"></div>
    </div>

    <div class="controls-hint">
        <div style="display:flex; justify-content:center;"><div class="key u"></div></div>
        <div style="display:flex; gap:5px;"><div class="key l"></div><div class="key d"></div><div class="key r"></div></div>
    </div>

    <button id="slideshow-btn">Start Slideshow</button>

    <script>
        const root = document.getElementById('gallery-root');
        const wrapper = document.getElementById('main-wrapper');
        const total = 39;
        let autoPlay = false;
        let slideTimer;

        // Generate Sections
        for (let i = 1; i <= total; i++) {
            const s = document.createElement('section');
            s.dataset.id = i;
            s.innerHTML = `<div class="photo-container"></div>`;
            root.appendChild(s);
        }

        const sections = document.querySelectorAll('header, section');

        // 3. INTERSECTION OBSERVER: Handles smooth fade-ins and lazy loading
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const id = entry.target.dataset.id;
                    const container = entry.target.querySelector('.photo-container');
                    if (id && container && !container.innerHTML) {
                        container.innerHTML = `<img src="img-${id}.avif" onload="this.style.opacity=1">`;
                    }
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.5 });

        sections.forEach(s => obs.observe(s));

        // Keyboard & Slideshow Logic
        function goTo(idx) {
            if (idx < 0 || idx >= sections.length) return;
            sections[idx].scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('keydown', (e) => {
            const current = Math.round(wrapper.scrollTop / window.innerHeight);
            if (e.key === "ArrowDown" || e.key === "ArrowRight") goTo(current + 1);
            if (e.key === "ArrowUp" || e.key === "ArrowLeft") goTo(current - 1);
        });

        const btn = document.getElementById('slideshow-btn');
        btn.addEventListener('click', () => {
            autoPlay = !autoPlay;
            btn.classList.toggle('active');
            btn.innerText = autoPlay ? "Stop Slideshow" : "Start Slideshow";
            if (autoPlay) {
                slideTimer = setInterval(() => {
                    const current = Math.round(wrapper.scrollTop / window.innerHeight);
                    const next = (current + 1) % sections.length;
                    goTo(next);
                }, 4000);
            } else {
                clearInterval(slideTimer);
            }
        });

        // Stops slideshow if user manually scrolls
        wrapper.addEventListener('touchstart', () => { if(autoPlay) btn.click(); });
        wrapper.addEventListener('wheel', () => { if(autoPlay) btn.click(); });
    </script>
</body>
</html>
