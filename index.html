<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA HDR • CLARENCE</title>
    <style>
        :root { --bg: #050505; --text: #f0f0f0; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Anti-Theft Protection */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

        header { padding: 120px 20px 80px; text-align: center; }
        
        h1 { 
            font-size: 0.8rem; font-weight: 300; letter-spacing: 0.6em; 
            text-transform: uppercase; margin: 0; opacity: 0.9;
        }
        
        .credit { 
            color: #555; font-size: 0.65rem; letter-spacing: 0.2em; 
            text-transform: uppercase; margin-top: 15px; 
        }

        /* Single Column Infinite Scroll */
        #gallery { 
            width: 100%; display: flex; flex-direction: column; 
            gap: 120px; /* Large elegant gap between shots */
            padding-bottom: 200px;
        }

        .photo-wrapper { 
            width: 100%; display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: translateY(30px); 
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .photo-wrapper.visible { opacity: 1; transform: translateY(0); }

        img { 
            display: block;
            max-width: 85%;  /* Leaves black margins on sides */
            max-height: 85vh; /* Prevents tall photos from bleeding off screen */
            width: auto; height: auto;
            object-fit: contain;
            border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            -webkit-user-drag: none; pointer-events: none;
        }

        @media (max-width: 768px) {
            header { padding: 80px 20px 50px; }
            #gallery { gap: 60px; }
            img { max-width: 92%; max-height: 75vh; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Ultra HDR Portfolio</h1>
        <div class="credit">Photographed by Clarence • 2023–2025</div>
    </header>

    <div id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');
        const totalImages = 39; 
        
        for (let i = 1; i <= totalImages; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'photo-wrapper';
            wrapper.innerHTML = `<img src="img-${i}.avif" loading="lazy" alt="HDR Landscape">`;
            gallery.appendChild(wrapper);
        }

        // Animation: Images reveal smoothly as you scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.photo-wrapper').forEach(w => observer.observe(w));
    </script>
</body>
</html>
